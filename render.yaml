services:
  - type: web
    name: htaso-umpire-eval
    env: python
    region: oregon
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn wsgi:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: False
      - key: PORT
        value: 8502

databases:
  - name: htaso-db
    databaseName: htaso_eval_db
    user: htaso_user
    plan: free
